services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - PORT=3001
    volumes:
      # 使用本地目录存储数据（推荐，方便备份）
      - ./data:/app/data
      # 或者使用 Docker volume：
      # - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

# 如果使用 Docker volume，取消下面的注释
# volumes:
#   backend-data: